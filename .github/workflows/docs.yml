name: docs

on:
  push:
    # `docs` is temporary — lets us preview the site on GitHub Pages while the
    # docs PR is open. Remove it once merged so only `main` publishes.
    branches: [main, docs]
    paths:
      - "docs/**"
      - "README.md"
      - "src/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Allow the GITHUB_TOKEN to deploy to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, cancelling in-progress runs
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - run: npm i -fg corepack && corepack enable
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: lts/*
          cache: "pnpm"
          cache-dependency-path: docs/pnpm-lock.yaml
      - name: Install dependencies
        working-directory: docs
        run: pnpm install
      - name: Build docs
        working-directory: docs
        run: pnpm build
      - name: Add CNAME for custom domain
        run: echo "ocache.unjs.io" > docs/.docs/.output/public/CNAME
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: docs/.docs/.output/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
