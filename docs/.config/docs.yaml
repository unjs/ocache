# yaml-language-server: $schema=https://unpkg.com/undocs/schema/config.json
name: ocache
url: https://ocache.unjs.io
shortDescription: Standalone caching utilities
description: Standalone caching utilities with TTL, SWR, and HTTP response caching. Zero framework dependencies.

themeColor: yellow
automd: true

github: unjs/ocache

# No blog section yet — redirect the built-in /blog route so it isn't
# prerendered into a 404.
redirects:
  "/blog": "/guide"
